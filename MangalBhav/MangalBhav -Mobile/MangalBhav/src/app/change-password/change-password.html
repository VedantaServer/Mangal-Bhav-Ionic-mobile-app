<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/tab1"></ion-back-button>
    </ion-buttons>
    <ion-title>Change Password</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
 <!-- Name -->
<ion-item>
  <ion-icon name="person-outline" slot="start" class="input-icon"></ion-icon>
  <ion-label>{{ txtname }}</ion-label>
</ion-item>

<!-- Username -->
<ion-item>
  <ion-icon name="person-circle-outline" slot="start" class="input-icon"></ion-icon>
  <ion-label>{{ txtUserName }}</ion-label>
</ion-item>

<!-- Previous Password -->
<ion-item>
  <ion-icon name="lock-open-outline" slot="start" class="input-icon"></ion-icon>
  <ion-input type="password" [(ngModel)]="txtpassword" placeholder="Previous Password" name="txtpassword"></ion-input>
</ion-item>

<!-- New Password -->
<ion-item>
  <ion-icon name="lock-closed-outline" slot="start" class="input-icon"></ion-icon>
  <ion-input type="password" [(ngModel)]="changepassword" placeholder="New Password" name="changepassword"></ion-input>
</ion-item>

<!-- Confirm Password -->
<ion-item>
  <ion-icon name="shield-checkmark-outline" slot="start" class="input-icon"></ion-icon>
  <ion-input type="password" [(ngModel)]="confirmchangepassword" placeholder="Confirm New Password" name="confirmchangepassword"></ion-input>
</ion-item>


  <div class="ion-padding">
    <ion-button expand="block" color="primary" (click)="doclick()">Save Password</ion-button>
  </div>

  <ion-item *ngIf="lblMessage">
    <ion-label color="success">{{ lblMessage }}</ion-label>
  </ion-item>
</ion-content>
