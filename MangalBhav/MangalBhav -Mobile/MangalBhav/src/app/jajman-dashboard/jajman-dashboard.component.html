<ion-header [translucent]="true">
  <ion-toolbar>
    <div class="inner-header">

      <div class="nav-logo" (click)="goToLoggedInHomePage()">
        <img src="../../assets/mangalbhavlogo1.jpeg" class="nav-logo-img" />
        <div class="logo-text-block">
          <div class="nav-logo-text">{{t.logoTitle}}</div>
          <div class="nav-logo-sub">{{t.logoSub}}</div>
        </div>
      </div>



      <!-- <button class="nav-icon-btn"  title="Change Language">🌐</button> -->

      <button class="header-logout-btn" (click)="openPage('find-pandit')">
        <ion-icon name="qr-code-outline"></ion-icon>
      </button>
   
      
    </div>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="page-wrapper">

    <!-- ===== GREETING ===== -->
    <div class="greeting">
      <div class="greeting-text">
        <p class="greeting-sub">{{ t.greeting }} {{userDetails?.FullName?.split(' ')?.[0]}} ji</p>
       <h2 class="greeting-title">{{ t.greetingTitle }}</h2>
      </div>
      <div class="greeting-om">ॐ</div>
    </div>

    <!-- ===== QUICK ACTIONS ===== -->
    <div class="section-label">{{ t.quickActions }}</div>

    <div class="dashboard-grid">



      <div class="dash-card" (click)="openPage('booking')">
        <div class="dash-icon">📅</div>
        <span>{{ t.myBookings }}</span>
      </div>


      <div class="dash-card" (click)="openPage('user-profile')">
        <div class="dash-icon">👤</div>
        <span>{{ t.profile }}</span>
      </div>
      <div class="dash-card" (click)="openPage('india-festival')">
        <div class="dash-icon">🪔</div>
        <span>{{ t.festivals }}</span>
      </div>



    </div>



    <div class="summary-row">

 
    </div>

   

    <!-- ===== DIVIDER ===== -->
    <div class="page-divider">✦ ॐ ✦ ॐ ✦</div>

    <div class="chalisa-slogan">
      <p>{{ sloganName}}</p>
    </div>

  </div>
</ion-content>



<ion-tab-bar slot="bottom" class="mb-tab-bar">

  <ion-tab-button (click)="openPage('loggedin-home')" class="mb-tab-btn">
    <ion-icon name="sparkles-outline"></ion-icon>
    <ion-label>Explore Life</ion-label>
  </ion-tab-button>

<!-- 
  <ion-tab-button class="mb-tab-spacer" disabled></ion-tab-button> -->

    <ion-tab-button class="mb-tab-btn" (click)="openPage('open-community-page')">
    <div class="custom-tab-icon"></div>
  </ion-tab-button>


  <ion-tab-button (click)="openPage('jajmandashboard')" class="mb-tab-btn">
    <ion-icon name="person"></ion-icon>
    <ion-label>{{ userDetails?.FullName?.split(' ')?.[0] || 'Me' }}</ion-label>
  </ion-tab-button>

</ion-tab-bar>
